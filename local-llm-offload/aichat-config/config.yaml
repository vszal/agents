# Isolated aichat config for Claude -> local-LLM offload (run-local.sh).
# Kept SEPARATE from your interactive ~/Library/.../aichat/config.yaml.
#
# Tools exposed to the on-device model (all NON-mutating):
#   * fs_ls, fs_cat       — read-only filesystem (never fs_write/fs_rm/fs_patch).
#   * web_search_tavily   — web search (needs TAVILY_API_KEY in the environment).
#   * web_fetch           — fetch ONE allowlisted URL; SSRF/private-IP guarded
#                           (see ../tools/web_fetch.sh + ../tools/url_guard.py).
# File-DATA reads are additionally confined to the per-task paths by sandbox-exec
# in run-local.sh, so a web-capable model cannot read ambient files and exfil
# them. Do NOT add fetch_url_via_curl/jina here — those are UNguarded arbitrary
# fetch. Web egress is bounded by ../tools/fetch-allowlist.txt.
#
# Local only: talks to mlx_lm.server on :8081. No cloud client on purpose.

model: mlx:mlx-community/Qwen3-14B-4bit
stream: false
save: false
function_calling: true
use_tools: fs_ls,fs_cat,web_search_tavily,web_fetch   # read-only fs + guarded web; never fs_write/fs_rm/fs_patch or unguarded fetch_url_*

# The `models:` list below is GENERATED from the live server by sync-models.sh.
# Don't hand-edit it — run ./sync-models.sh after the served model set changes.
clients:
- type: openai-compatible
  name: mlx
  api_base: http://localhost:8081/v1
  api_key: dummy
  models:
  - name: mlx-community/Mistral-Small-3.2-24B-Instruct-2506-4bit
    max_output_tokens: 8192
  - name: mlx-community/Qwen2.5-Coder-14B-Instruct-4bit
    max_output_tokens: 8192
  - name: mlx-community/Qwen3-0.6B-4bit
    max_output_tokens: 8192
  - name: mlx-community/Qwen3-14B-4bit
    max_output_tokens: 8192
  - name: mlx-community/phi-4-4bit
    max_output_tokens: 8192
  - name: rajaschitnis/gemma-4-12b-it-text-only-4bit-mlx
    max_output_tokens: 8192
